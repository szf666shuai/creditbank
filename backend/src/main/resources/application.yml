spring:
  application:
    name: credit-bank-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/credit_bank?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: creditbank
    password: creditbank123

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456
      database: 0
      timeout: 3000ms

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.creditbank.platform: debug

jwt:
  secret: credit-bank-platform-jwt-secret-key-2026-very-long-string
  expiration-ms: 86400000

app:
  seed-search-data: true

# DeepSeek（OpenAI 兼容）。本地密钥放 application-local.yml，勿提交仓库
llm:
  enabled: true
  provider: deepseek
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.deepseek.com}
  model: ${LLM_MODEL:deepseek-chat}
  timeout-ms: 60000
  system-prompt: |
    你是「学分银行」平台的学习助手。请用简洁、友好的中文回答。
    你可以帮助用户：找课程与活动、了解积分商城与诚信分、给出学习建议。
    若问题超出平台能力，请诚实说明，并给出可操作的下一步建议。
