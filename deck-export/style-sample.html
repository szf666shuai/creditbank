<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<style>
  :root{
    --cream:#FFF9F0; --ink:#1A202C;
    --green:#22C55E; --blue:#BEE3F8; --purple-l:#DDD6FE; --purple:#7C3AED;
    --shadow:6px 6px 0 var(--ink);
    --border:3px solid var(--ink);
    --r-card:14px; --r-pill:999px;
    --font: 'Noto Sans SC', system-ui, sans-serif;
    --mono: 'SFMono-Regular', Consolas, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--cream); font-family:var(--font); color:var(--ink); padding:36px; position:relative; overflow:hidden; min-height:560px;}
  .blob{position:absolute; border:var(--border); z-index:0;}
  .blob-blue{top:-46px; right:-34px; width:150px; height:150px; background:var(--blue); border-radius:50%;}
  .blob-purple{bottom:-58px; left:-46px; width:172px; height:172px; background:var(--purple-l); border-radius:46% 54% 60% 40%;}
  .stage{position:relative; z-index:1;}
  /* component: top nav bar */
  .nav{display:flex; align-items:center; gap:16px; background:#fff; border:var(--border); box-shadow:var(--shadow); border-radius:var(--r-card); padding:14px 20px; margin-bottom:24px;}
  .logo{width:42px; height:42px; border-radius:50%; background:var(--green); border:var(--border); display:flex; align-items:center; justify-content:center;}
  .brand{font-weight:900; font-size:20px;}
  .menu{margin-left:8px; display:flex; gap:14px; font-size:14px; font-weight:700;}
  .search{margin-left:auto; border:var(--border); border-radius:var(--r-pill); padding:6px 16px; font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px;}
  /* component: KPI cards */
  .kpis{display:flex; gap:20px;}
  .card{background:#fff; border:var(--border); box-shadow:var(--shadow); border-radius:var(--r-card); padding:20px;}
  .card.green{background:var(--green);}
  .num{font-family:var(--mono); font-weight:900; font-size:42px; line-height:1;}
  .num small{font-size:20px;}
  .lbl{font-size:13px; font-weight:700; margin-top:6px;}
  .bar{margin-top:14px; height:16px; background:#fff; border:var(--border); border-radius:var(--r-pill); overflow:hidden;}
  .bar > i{display:block; height:100%; width:68%; background:var(--green);}
  .pill{display:inline-block; margin-top:16px; background:var(--ink); color:#fff; border-radius:var(--r-pill); padding:9px 20px; font-size:13px; font-weight:800;}
  /* component: badges */
  .badges{display:flex; gap:12px; margin-top:22px; flex-wrap:wrap;}
  .badge{border:var(--border); border-radius:var(--r-pill); padding:7px 16px; font-size:13px; font-weight:800; display:flex; align-items:center; gap:8px;}
  .badge.blue{background:var(--blue);}
  .badge.purple{background:var(--purple-l);}
  .badge.green{background:var(--green);}
  /* component: floating icon badge (SVG, not emoji) */
  .float{position:absolute; z-index:2; width:54px; height:54px; border-radius:50%; background:#fff; border:var(--border); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center;}
  .f1{top:150px; right:60px;} .f2{top:250px; right:30px;} .f3{top:330px; right:90px;}
</style>
</head>
<body>
  <div class="blob blob-blue"></div>
  <div class="blob blob-purple"></div>

  <div class="stage">
    <!-- 顶部导航条 (组件母题) -->
    <div class="nav">
      <span class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#1A202C" d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
      </span>
      <span class="brand">星秩存册</span>
      <span class="menu"><span>首页</span><span>商城</span><span>论坛</span><span>企业中心</span></span>
      <span class="search">
        <svg width="14" height="14" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="#1A202C" stroke-width="2.5"/><line x1="16" y1="16" x2="22" y2="22" stroke="#1A202C" stroke-width="2.5"/></svg>
        搜索
      </span>
    </div>

    <!-- KPI 卡片 (组件母题) -->
    <div class="kpis">
      <div class="card" style="flex:1.1;">
        <div class="num">68<small>%</small></div>
        <div class="lbl">学习档案完成度</div>
        <div class="bar"><i></i></div>
      </div>
      <div class="card green" style="flex:1;">
        <div class="num">1,280</div>
        <div class="lbl">累计学分</div>
        <span class="pill">查看详情 →</span>
      </div>
    </div>

    <!-- pill badge (组件母题) -->
    <div class="badges">
      <span class="badge blue">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#1A202C" d="M4 4h7v16H4zM13 4h7v16h-7z"/></svg>
        学习资源
      </span>
      <span class="badge purple">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#1A202C" d="M6 3h12v4H6zM7 8h10v12H7zM10 11h4v6h-4z"/></svg>
        成就
      </span>
      <span class="badge green">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#1A202C" d="M5 12l5 5 9-11" fill="none" stroke="#1A202C" stroke-width="3"/></svg>
        已认证
      </span>
    </div>
  </div>

  <!-- 浮动图标徽章 (SVG 图标，非 emoji) -->
  <div class="float f1"><svg width="26" height="26" viewBox="0 0 24 24"><path fill="#1A202C" d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg></div>
  <div class="float f2"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#1A202C" d="M4 4h7v16H4zM13 4h7v16h-7z"/></svg></div>
  <div class="float f3"><svg width="26" height="26" viewBox="0 0 24 24"><path fill="#1A202C" d="M6 3h12v4H6zM7 8h10v12H7zM10 11h4v6h-4z"/></svg></div>
</body>
</html>
