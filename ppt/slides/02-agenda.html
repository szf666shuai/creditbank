<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>答辩大纲</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    
    :root {
      --nb-ink: #1a202c;
      --nb-cream: #fff9f0;
      --nb-green: #22c55e;
      --nb-green-deep: #16a34a;
      --nb-blue: #bee3f8;
      --nb-pink: #fecdd3;
      --nb-purple: #ddd6fe;
      --nb-shadow: 4px 4px 0 0 var(--nb-ink);
      --font-heading: 'Nunito', 'PingFang SC', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--nb-cream);
      font-family: var(--font-heading);
    }
    
    .slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 80px 120px;
      position: relative;
    }
    
    .page-header {
      margin-bottom: 60px;
    }
    
    .page-header .page-number {
      font-size: 1rem;
      font-weight: 800;
      color: var(--nb-green);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    
    .page-header h2 {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--nb-ink);
    }
    
    .agenda-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      flex: 1;
    }
    
    .agenda-item {
      background: #fff;
      border: 3px solid var(--nb-ink);
      border-radius: 20px;
      box-shadow: var(--nb-shadow);
      padding: 32px;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    
    .agenda-item:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 0 var(--nb-ink);
    }
    
    .agenda-item__number {
      font-size: 3rem;
      font-weight: 900;
      color: var(--nb-green);
      margin-bottom: 16px;
      line-height: 1;
    }
    
    .agenda-item__title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--nb-ink);
      margin-bottom: 12px;
    }
    
    .agenda-item__desc {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      flex: 1;
    }
    
    .agenda-item__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    
    .agenda-tag {
      background: var(--nb-blue);
      border: 2px solid var(--nb-ink);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--nb-ink);
    }
    
    .agenda-item:nth-child(1) { grid-row: span 2; background: var(--nb-green); }
    .agenda-item:nth-child(1) .agenda-item__number,
    .agenda-item:nth-child(1) .agenda-item__title { color: #fff; }
    .agenda-item:nth-child(1) .agenda-item__desc { color: rgba(255,255,255,0.85); }
    .agenda-item:nth-child(1) .agenda-tag { background: rgba(255,255,255,0.3); color: #fff; border-color: #fff; }
    
    .agenda-item:nth-child(2) { background: var(--nb-blue); }
    .agenda-item:nth-child(3) { background: var(--nb-pink); }
    .agenda-item:nth-child(4) { background: var(--nb-purple); }
    
    .footer-note {
      text-align: center;
      margin-top: 40px;
      font-size: 1rem;
      color: #64748b;
    }
    
    .footer-note span {
      color: var(--nb-green);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="page-header">
      <div class="page-number">02 / 12</div>
      <h2>答辩大纲</h2>
    </div>
    
    <div class="agenda-grid">
      <div class="agenda-item">
        <div class="agenda-item__number">01</div>
        <div class="agenda-item__title">品牌故事</div>
        <div class="agenda-item__desc">为什么做这个项目？教育的痛点、市场的需求、我们的愿景</div>
        <div class="agenda-item__tags">
          <span class="agenda-tag">项目背景</span>
          <span class="agenda-tag">市场调研</span>
          <span class="agenda-tag">品牌定位</span>
        </div>
      </div>
      
      <div class="agenda-item">
        <div class="agenda-item__number">02</div>
        <div class="agenda-item__title">产品设计</div>
        <div class="agenda-item__desc">色彩心理学、Neo-brutal风格、用户体验设计</div>
        <div class="agenda-item__tags">
          <span class="agenda-tag">视觉设计</span>
          <span class="agenda-tag">色彩理论</span>
          <span class="agenda-tag">UX</span>
        </div>
      </div>
      
      <div class="agenda-item">
        <div class="agenda-item__number">03</div>
        <div class="agenda-item__title">核心功能</div>
        <div class="agenda-item__desc">学习管理、AI助手、企业对接、社交社区</div>
        <div class="agenda-item__tags">
          <span class="agenda-tag">功能展示</span>
          <span class="agenda-tag">Agent</span>
          <span class="agenda-tag">创新</span>
        </div>
      </div>
      
      <div class="agenda-item">
        <div class="agenda-item__number">04</div>
        <div class="agenda-item__title">技术路线</div>
        <div class="agenda-item__desc">架构设计、技术栈、核心创新点</div>
        <div class="agenda-item__tags">
          <span class="agenda-tag">架构</span>
          <span class="agenda-tag">技术栈</span>
          <span class="agenda-tag">创新</span>
        </div>
      </div>
      
      <div class="agenda-item">
        <div class="agenda-item__number">05</div>
        <div class="agenda-item__title">流程演示</div>
        <div class="agenda-item__desc">面试流程、活动流程、学习流程</div>
        <div class="agenda-item__tags">
          <span class="agenda-tag">流程</span>
          <span class="agenda-tag">演示</span>
        </div>
      </div>
      
      <div class="agenda-item">
        <div class="agenda-item__number">06</div>
        <div class="agenda-item__title">团队与展望</div>
        <div class="agenda-item__desc">团队介绍、项目小结、未来规划</div>
        <div class="agenda-item__tags">
          <span class="agenda-tag">团队</span>
          <span class="agenda-tag">总结</span>
          <span class="agenda-tag">展望</span>
        </div>
      </div>
    </div>
    
    <div class="footer-note">
      <p>接下来，让我们开启一段<span>终身学习</span>的故事...</p>
    </div>
  </div>
</body>
</html>
