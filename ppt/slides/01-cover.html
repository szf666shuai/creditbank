<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>封面 - 学分银行平台</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    
    :root {
      --nb-ink: #1a202c;
      --nb-cream: #fff9f0;
      --nb-green: #22c55e;
      --nb-green-deep: #16a34a;
      --nb-blue: #bee3f8;
      --nb-pink: #fecdd3;
      --nb-yellow: #fef08a;
      --nb-shadow: 6px 6px 0 0 var(--nb-ink);
      --nb-shadow-lg: 8px 8px 0 0 var(--nb-ink);
      --font-heading: 'Nunito', 'PingFang SC', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--nb-cream);
      font-family: var(--font-heading);
    }
    
    .slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 60px;
    }
    
    .glow-bg {
      position: absolute;
      top: -10%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .logo-badge {
      width: 120px;
      height: 120px;
      background: var(--nb-green);
      border: 4px solid var(--nb-ink);
      border-radius: 28px;
      box-shadow: var(--nb-shadow-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      transform: rotate(-3deg);
    }
    
    .logo-badge svg {
      width: 70px;
      height: 70px;
      fill: #fff;
    }
    
    .main-title {
      font-size: 5.5rem;
      font-weight: 900;
      color: var(--nb-ink);
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: -2px;
      line-height: 1.1;
    }
    
    .main-title span {
      color: var(--nb-green);
    }
    
    .subtitle {
      font-size: 1.8rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 60px;
      text-align: center;
    }
    
    .tagline-card {
      background: #fff;
      border: 3px solid var(--nb-ink);
      border-radius: 24px;
      box-shadow: var(--nb-shadow);
      padding: 24px 48px;
      margin-bottom: 50px;
    }
    
    .tagline-card p {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--nb-ink);
      text-align: center;
    }
    
    .tagline-card p span {
      color: var(--nb-green);
    }
    
    .bottom-info {
      display: flex;
      gap: 48px;
      align-items: center;
    }
    
    .info-box {
      background: #fff;
      border: 2.5px solid var(--nb-ink);
      border-radius: 16px;
      box-shadow: 3px 3px 0 0 var(--nb-ink);
      padding: 16px 28px;
      text-align: center;
    }
    
    .info-box .label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
    }
    
    .info-box .value {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--nb-green);
    }
    
    .version-badge {
      background: var(--nb-blue);
      border: 2px solid var(--nb-ink);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: 800;
      color: var(--nb-ink);
      transform: rotate(2deg);
    }
    
    .decor-dot {
      position: absolute;
      width: 24px;
      height: 24px;
      background: var(--nb-pink);
      border: 2px solid var(--nb-ink);
      border-radius: 50%;
    }
    
    .decor-dot:nth-child(1) { top: 80px; left: 80px; }
    .decor-dot:nth-child(2) { top: 120px; left: 150px; }
    .decor-dot:nth-child(3) { bottom: 100px; right: 120px; }
    .decor-dot:nth-child(4) { bottom: 150px; right: 80px; }
    
    .decor-square {
      position: absolute;
      width: 32px;
      height: 32px;
      background: var(--nb-yellow);
      border: 3px solid var(--nb-ink);
      border-radius: 8px;
    }
    
    .decor-square:nth-child(5) { top: 60px; right: 100px; transform: rotate(15deg); }
    .decor-square:nth-child(6) { bottom: 80px; left: 100px; transform: rotate(-10deg); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="glow-bg"></div>
    <div class="decor-dot"></div>
    <div class="decor-dot"></div>
    <div class="decor-dot"></div>
    <div class="decor-dot"></div>
    <div class="decor-square"></div>
    <div class="decor-square"></div>
    
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    
    <h1 class="main-title">
      <span>学分</span>银行平台
    </h1>
    
    <p class="subtitle">终身学习学分银行平台学习管理系统</p>
    
    <div class="tagline-card">
      <p>「让学习成为一种<span>生活方式</span>」</p>
    </div>
    
    <div class="bottom-info">
      <div class="info-box">
        <div class="label">团队</div>
        <div class="value">4人小组</div>
      </div>
      <div class="info-box">
        <div class="label">技术栈</div>
        <div class="value">Vue3 + Spring Boot</div>
      </div>
      <div class="info-box">
        <div class="label">版本</div>
        <div class="value">v1.0.0</div>
      </div>
      <div class="version-badge">答辩演示版</div>
    </div>
  </div>
</body>
</html>
