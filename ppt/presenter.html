<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学分银行平台 - 答辩演示</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    
    #slideContainer {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    #slideFrame {
      width: 1920px;
      height: 1080px;
      border: none;
      background: #fff9f0;
    }
    
    .nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 24px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 9999;
    }
    
    .nav button {
      width: 40px;
      height: 40px;
      border: 2px solid #22c55e;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    
    .nav button:hover {
      background: #16a34a;
    }
    
    .nav span {
      color: white;
      font-size: 16px;
      font-weight: bold;
    }
    
    .nav .current {
      color: #22c55e;
    }
    
    .help {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 9999;
    }
    
    .help h4 {
      color: #22c55e;
      margin: 0 0 8px 0;
    }
    
    .help ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .help li {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="help" id="helpBox">
    <h4>快捷键</h4>
    <ul>
      <li>→ / 空格: 下一页</li>
      <li>←: 上一页</li>
      <li>F11: 全屏</li>
      <li>H: 隐藏帮助</li>
    </ul>
  </div>
  
  <div id="slideContainer">
    <iframe id="slideFrame" src="slides/01-cover.html"></iframe>
  </div>
  
  <div class="nav">
    <button onclick="prevSlide()">◀</button>
    <span><span id="currentNum" class="current">1</span> / <span id="totalNum">12</span></span>
    <button onclick="nextSlide()">▶</button>
  </div>

  <script>
    const slides = [
      'slides/01-cover.html',
      'slides/02-agenda.html',
      'slides/03-story.html',
      'slides/04-positioning.html',
      'slides/05-color.html',
      'slides/06-functions.html',
      'slides/07-agent.html',
      'slides/08-tech.html',
      'slides/09-innovation.html',
      'slides/10-process.html',
      'slides/11-team.html',
      'slides/12-summary.html'
    ];
    
    let currentIndex = 0;
    const frame = document.getElementById('slideFrame');
    const currentNum = document.getElementById('currentNum');
    
    function updateSlide(i) {
      currentIndex = i;
      frame.src = slides[currentIndex];
      currentNum.textContent = currentIndex + 1;
    }
    
    function nextSlide() {
      if (currentIndex < slides.length - 1) {
        updateSlide(currentIndex + 1);
      }
    }
    
    function prevSlide() {
      if (currentIndex > 0) {
        updateSlide(currentIndex - 1);
      }
    }
    
    function fitToScreen() {
      const container = document.getElementById('slideContainer');
      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const slideWidth = 1920;
      const slideHeight = 1080;
      
      const scaleX = containerWidth / slideWidth;
      const scaleY = containerHeight / slideHeight;
      const scale = Math.min(scaleX, scaleY);
      
      frame.style.transform = `scale(${scale})`;
      frame.style.transformOrigin = 'center center';
    }
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSlide();
      }
      if (e.key === 'h' || e.key === 'H') {
        const help = document.getElementById('helpBox');
        help.style.display = help.style.display === 'none' ? 'block' : 'none';
      }
    });
    
    window.addEventListener('resize', fitToScreen);
    fitToScreen();
  </script>
</body>
</html>
